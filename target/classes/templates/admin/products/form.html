<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${isNew} ? 'Nouveau produit' : 'Modifier produit'">Produit</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-brand">
        <h1>⚡ Admin Panel</h1>
        <p>Mini Marketplace</p>
    </div>
    <nav class="sidebar-nav">
        <div class="nav-section">Navigation</div>
        <a th:href="@{/admin}" class="nav-link">
            <span class="nav-icon">🏠</span> Dashboard
        </a>
        <div class="nav-section">Gestion</div>
        <a th:href="@{/admin/users}" class="nav-link">
            <span class="nav-icon">👥</span> Utilisateurs
        </a>
        <a th:href="@{/admin/products}" class="nav-link active">
            <span class="nav-icon">📦</span> Produits
        </a>
        <a th:href="@{/admin/categories}" class="nav-link">
            <span class="nav-icon">🏷️</span> Catégories
        </a>
        <div class="nav-section">App</div>
        <a th:href="@{/dashboard}" class="nav-link">
            <span class="nav-icon">🛒</span> Marketplace
        </a>
    </nav>
    <div class="sidebar-footer">
        <form th:action="@{/logout}" method="post">
            <button type="submit">🚪 Se déconnecter</button>
        </form>
    </div>
</aside>

<main class="main">
    <div class="topbar">
        <h2 th:text="${isNew} ? 'Nouveau produit' : 'Modifier : ' + ${product.name}">Produit</h2>
    </div>

    <div class="content">

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <div class="card" style="max-width: 600px;">
            <div class="card-header">
                <h3 th:text="${isNew} ? 'Créer un produit' : 'Modifier le produit'">Produit</h3>
            </div>
            <div class="card-body">

                <!-- Formulaire création -->
                <form th:if="${isNew}"
                      th:action="@{/admin/products/save}"
                      th:object="${product}"
                      method="post">

                    <div class="form-group">
                        <label>Nom du produit *</label>
                        <input type="text" th:field="*{name}"
                               placeholder="ex: Laptop Pro" required/>
                    </div>

                    <div class="form-group">
                        <label>Description</label>
                        <textarea th:field="*{description}" rows="3"
                                  placeholder="Décrivez le produit…"></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Prix ($) *</label>
                            <input type="number" th:field="*{price}"
                                   step="0.01" min="0" placeholder="0.00" required/>
                        </div>
                        <div class="form-group">
                            <label>Stock *</label>
                            <input type="number" th:field="*{stock}"
                                   min="0" placeholder="0" required/>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Catégorie</label>
                        <select th:field="*{category.id}">
                            <option value="">— Sans catégorie —</option>
                            <option th:each="cat : ${categories}"
                                    th:value="${cat.id}"
                                    th:text="${cat.name}">
                            </option>
                        </select>
                    </div>

                    <div style="display:flex; gap:12px; margin-top:8px;">
                        <button type="submit" class="btn btn-primary">✅ Créer le produit</button>
                        <a th:href="@{/admin/products}" class="btn btn-secondary">Annuler</a>
                    </div>
                </form>

                <!-- Formulaire modification -->
                <form th:if="${!isNew}"
                      th:action="@{/admin/products/update/{id}(id=${product.id})}"
                      th:object="${product}"
                      method="post">

                    <div class="form-group">
                        <label>Nom du produit *</label>
                        <input type="text" th:field="*{name}"
                               placeholder="ex: Laptop Pro" required/>
                    </div>

                    <div class="form-group">
                        <label>Description</label>
                        <textarea th:field="*{description}" rows="3"
                                  placeholder="Décrivez le produit…"></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Prix ($) *</label>
                            <input type="number" th:field="*{price}"
                                   step="0.01" min="0" placeholder="0.00" required/>
                        </div>
                        <div class="form-group">
                            <label>Stock *</label>
                            <input type="number" th:field="*{stock}"
                                   min="0" placeholder="0" required/>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Catégorie</label>
                        <select th:field="*{category.id}">
                            <option value="">— Sans catégorie —</option>
                            <option th:each="cat : ${categories}"
                                    th:value="${cat.id}"
                                    th:text="${cat.name}"
                                    th:selected="${product.category != null and product.category.id == cat.id}">
                            </option>
                        </select>
                    </div>

                    <!-- QR Code actuel -->
                    <div th:if="${product.qrCode}" class="form-group">
                        <label>QR Code actuel</label>
                        <div style="margin-top:8px;">
                            <img th:src="@{'data:image/png;base64,' + ${product.qrCode}}"
                                 width="100" height="100" alt="QR Code"
                                 style="border-radius:8px; border:1px solid var(--border);"/>
                        </div>
                    </div>

                    <div style="display:flex; gap:12px; margin-top:8px;">
                        <button type="submit" class="btn btn-primary">💾 Enregistrer</button>
                        <a th:href="@{/admin/products}" class="btn btn-secondary">Annuler</a>
                    </div>
                </form>

            </div>
        </div>

    </div>
</main>

</body>
</html>
