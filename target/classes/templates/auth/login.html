<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="auth-container">
    <h2>Mini Marketplace</h2>
    <form th:action="@{/login}" method="post">
        <div th:if="${param.error}" class="error">Invalid username or password</div>
        <div th:if="${param.logout}" class="success">You have been logged out</div>
        <div th:if="${param.registered}" class="success">Registration successful! Please login</div>
        <input type="text" name="username" placeholder="Username" required/>
        <input type="password" name="password" placeholder="Password" required/>
        <button type="submit">Login</button>
        <p><a th:href="@{/register}">Don't have an account? Register</a></p>
    </form>
</div>
</body>
</html>
