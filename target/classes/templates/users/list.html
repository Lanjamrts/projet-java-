<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Users</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar">
    <a th:href="@{/dashboard}">Dashboard</a>
    <div>
        <a th:href="@{/admin}">Admin Panel ⚡</a>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit" class="btn-link">Logout</button>
        </form>
    </div>
</nav>
<div class="container">
    <div class="header-row">
        <h1>Users</h1>
        <a th:href="@{/admin/users/new}" class="btn">+ Add User</a>
    </div>
    <table>
        <thead><tr><th>#</th><th>Username</th><th>Email</th><th>Role</th><th>Actions</th></tr></thead>
        <tbody>
        <tr th:each="u : ${users}">
            <td th:text="${u.id}"></td>
            <td th:text="${u.username}"></td>
            <td th:text="${u.email}"></td>
            <td th:text="${u.role}"></td>
            <td>
                <a th:href="@{/admin/users/edit/{id}(id=${u.id})}" class="btn-sm">Edit</a>
                <a th:href="@{/admin/users/delete/{id}(id=${u.id})}" class="btn-sm btn-danger"
                   onclick="return confirm('Delete?')">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
