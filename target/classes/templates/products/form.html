<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${product.id == null} ? 'New Product' : 'Edit Product'">Product Form</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar">
    <span>Mini Marketplace</span>
    <div>
        <a th:href="@{/dashboard}">Dashboard</a>
        <a th:href="@{/products}">Products</a>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/users}">Users</a>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin}" style="font-weight:600;">⚡ Admin</a>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit" class="btn-link">Logout</button>
        </form>
    </div>
</nav>
<div class="container">
    <div class="auth-container" style="max-width: 600px; margin-top: 40px;">
        <h2 th:text="${product.id == null} ? 'New Product' : 'Edit Product'">Product Form</h2>
        
        <form th:action="${product.id == null} ? @{/products/save} : @{/products/update/{id}(id=${product.id})}"
              method="post">
            <div class="form-group">
                <label>Nom du produit</label>
                <input type="text" name="name" th:value="${product.name}" required/>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea name="description" th:text="${product.description}"></textarea>
            </div>
            <div class="form-group">
                <label>Prix (USD)</label>
                <input type="number" name="price" th:value="${product.price}" step="0.01" min="0" required/>
            </div>
            <div class="form-group">
                <label>Stock</label>
                <input type="number" name="stock" th:value="${product.stock}" min="0" required/>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button type="submit" class="btn" style="flex:1;">Save Product</button>
                <a th:href="@{/products}" class="btn btn-secondary" style="flex:1; text-align:center;">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
