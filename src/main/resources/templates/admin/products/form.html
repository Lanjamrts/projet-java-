<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${isNew} ? 'Admin — Nouveau produit' : 'Admin — Modifier produit'">Admin</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
    <div class="sidebar-brand">
        <h1>⚡ Admin Panel</h1>
        <p>Mini Marketplace</p>
    </div>
    <nav class="sidebar-nav">
        <div class="nav-section">Navigation</div>
        <a th:href="@{/admin}" class="nav-link">
            <span class="nav-icon">🏠</span> Dashboard
        </a>
        <div class="nav-section">Gestion</div>
        <a th:href="@{/admin/users}" class="nav-link">
            <span class="nav-icon">👥</span> Utilisateurs
        </a>
        <a th:href="@{/admin/products}" class="nav-link active">
            <span class="nav-icon">📦</span> Produits
        </a>
        <div class="nav-section">App</div>
        <a th:href="@{/dashboard}" class="nav-link">
            <span class="nav-icon">🛒</span> Marketplace
        </a>
    </nav>
    <div class="sidebar-footer">
        <form th:action="@{/logout}" method="post">
            <button type="submit">🚪 Se déconnecter</button>
        </form>
    </div>
</aside>

<!-- Main -->
<main class="main">
    <div class="topbar">
        <h2 th:text="${isNew} ? 'Nouveau produit' : 'Modifier le produit'">Produit</h2>
        <a th:href="@{/admin/products}" class="btn-sm btn-edit">← Retour</a>
    </div>

    <div class="content">

        <div class="form-card">
            <form th:action="${isNew} ? @{/admin/products/save} : @{/admin/products/update/{id}(id=${product.id})}"
                  method="post">

                <div class="form-group">
                    <label>Nom du produit</label>
                    <input type="text" name="name" th:value="${product.name}"
                           placeholder="ex: iPhone 15" required/>
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea name="description" placeholder="Décrivez le produit..."
                              th:text="${product.description}"></textarea>
                </div>

                <div class="form-group">
                    <label>Prix (USD)</label>
                    <input type="number" name="price" th:value="${product.price}"
                           step="0.01" min="0" placeholder="ex: 99.99" required/>
                </div>

                <div class="form-group">
                    <label>Stock</label>
                    <input type="number" name="stock" th:value="${product.stock}"
                           min="0" placeholder="ex: 100" required/>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">
                        <span th:text="${isNew} ? '✅ Créer' : '💾 Enregistrer'">Enregistrer</span>
                    </button>
                    <a th:href="@{/admin/products}" class="btn" style="background:var(--bg-hover); color:var(--text-muted);">
                        Annuler
                    </a>
                </div>
            </form>
        </div>

    </div>
</main>

</body>
</html>
