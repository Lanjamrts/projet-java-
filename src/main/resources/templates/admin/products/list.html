<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Produits — Admin</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-brand">
        <h1>⚡ Admin Panel</h1>
        <p>Mini Marketplace</p>
    </div>
    <nav class="sidebar-nav">
        <div class="nav-section">Navigation</div>
        <a th:href="@{/admin}" class="nav-link">
            <span class="nav-icon">🏠</span> Dashboard
        </a>
        <div class="nav-section">Gestion</div>
        <a th:href="@{/admin/users}" class="nav-link">
            <span class="nav-icon">👥</span> Utilisateurs
        </a>
        <a th:href="@{/admin/products}" class="nav-link active">
            <span class="nav-icon">📦</span> Produits
        </a>
        <a th:href="@{/admin/categories}" class="nav-link">
            <span class="nav-icon">🏷️</span> Catégories
        </a>
        <div class="nav-section">App</div>
        <a th:href="@{/dashboard}" class="nav-link">
            <span class="nav-icon">🛒</span> Marketplace
        </a>
    </nav>
    <div class="sidebar-footer">
        <form th:action="@{/logout}" method="post">
            <button type="submit">🚪 Se déconnecter</button>
        </form>
    </div>
</aside>

<main class="main">
    <div class="topbar">
        <h2>Produits</h2>
    </div>

    <div class="content">

        <!-- Flash messages -->
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>

        <div class="card">
            <div class="card-header">
                <h3>Tous les produits</h3>
                <a th:href="@{/admin/products/new}" class="btn btn-primary">+ Nouveau produit</a>
            </div>
            <div class="card-body">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Nom</th>
                            <th>Catégorie</th>
                            <th>Prix</th>
                            <th>Stock</th>
                            <th>QR</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="p : ${products}">
                            <td th:text="${p.id}"></td>
                            <td>
                                <a th:href="@{/products/{id}(id=${p.id})}"
                                   th:text="${p.name}"
                                   target="_blank">Produit</a>
                            </td>
                            <td>
                                <span th:if="${p.category != null}"
                                      class="badge badge-admin-cat"
                                      th:text="${p.category.name}">Catégorie</span>
                                <span th:if="${p.category == null}"
                                      style="color: var(--text-muted); font-size:0.8rem;">—</span>
                            </td>
                            <td th:text="'$' + ${#numbers.formatDecimal(p.price,1,'COMMA',2,'POINT')}"></td>
                            <td>
                                <!-- Badge stock coloré -->
                                <span th:if="${p.stock == 0}"
                                      class="badge badge-danger"
                                      th:text="${p.stock}">0</span>
                                <span th:if="${p.stock > 0 and p.stock <= 5}"
                                      class="badge badge-warning"
                                      th:text="${p.stock}">0</span>
                                <span th:if="${p.stock > 5}"
                                      class="badge badge-success"
                                      th:text="${p.stock}">0</span>
                            </td>
                            <td>
                                <img th:if="${p.qrCode}"
                                     th:src="@{'data:image/png;base64,' + ${p.qrCode}}"
                                     width="40" height="40" alt="QR"
                                     style="border-radius:4px;"/>
                                <span th:if="${p.qrCode == null}"
                                      style="color:var(--text-muted); font-size:0.8rem;">—</span>
                            </td>
                            <td>
                                <div style="display:flex; gap:6px; align-items:center;">
                                    <a th:href="@{/admin/products/edit/{id}(id=${p.id})}"
                                       class="btn-sm btn-edit">✏️ Modifier</a>
                                    <!-- Suppression via POST (sécurisé) -->
                                    <form th:action="@{/admin/products/delete/{id}(id=${p.id})}"
                                          method="post"
                                          onsubmit="return confirm('Supprimer « ' + /*[[${p.name}]]*/ '' + ' » ?')">
                                        <button type="submit" class="btn-sm btn-danger">
                                            🗑️ Supprimer
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(products)}">
                            <td colspan="7" style="text-align:center; color:var(--text-muted); padding:32px;">
                                Aucun produit.
                                <a th:href="@{/admin/products/new}">Créer le premier →</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</main>

<script>
document.querySelectorAll('.alert').forEach(a => {
    setTimeout(() => a.style.opacity = '0', 3500);
    setTimeout(() => a.remove(), 4000);
});
</script>
</body>
</html>
