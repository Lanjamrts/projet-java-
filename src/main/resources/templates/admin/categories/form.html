<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${isNew} ? 'Nouvelle catégorie' : 'Modifier catégorie'">Catégorie</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-brand">
        <h1>⚡ Admin Panel</h1>
        <p>Mini Marketplace</p>
    </div>
    <nav class="sidebar-nav">
        <div class="nav-section">Navigation</div>
        <a th:href="@{/admin}" class="nav-link">
            <span class="nav-icon">🏠</span> Dashboard
        </a>
        <div class="nav-section">Gestion</div>
        <a th:href="@{/admin/users}" class="nav-link">
            <span class="nav-icon">👥</span> Utilisateurs
        </a>
        <a th:href="@{/admin/products}" class="nav-link">
            <span class="nav-icon">📦</span> Produits
        </a>
        <a th:href="@{/admin/categories}" class="nav-link active">
            <span class="nav-icon">🏷️</span> Catégories
        </a>
        <div class="nav-section">App</div>
        <a th:href="@{/dashboard}" class="nav-link">
            <span class="nav-icon">🛒</span> Marketplace
        </a>
    </nav>
    <div class="sidebar-footer">
        <form th:action="@{/logout}" method="post">
            <button type="submit">🚪 Se déconnecter</button>
        </form>
    </div>
</aside>

<main class="main">
    <div class="topbar">
        <h2 th:text="${isNew} ? 'Nouvelle catégorie' : 'Modifier la catégorie'">Catégorie</h2>
    </div>

    <div class="content">

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <div class="card" style="max-width: 520px;">
            <div class="card-header">
                <h3 th:text="${isNew} ? 'Créer une catégorie' : 'Modifier : ' + ${category.name}">
                    Catégorie
                </h3>
            </div>
            <div class="card-body">

                <!-- Création -->
                <form th:if="${isNew}"
                      th:action="@{/admin/categories/save}"
                      th:object="${category}"
                      method="post">
                    <div class="form-group">
                        <label for="name">Nom de la catégorie</label>
                        <input type="text" id="name" th:field="*{name}"
                               placeholder="ex: Électronique" required/>
                        <small style="color: var(--text-muted); font-size: 0.8rem;">
                            Le slug sera généré automatiquement depuis le nom.
                        </small>
                    </div>
                    <div style="display:flex; gap:12px; margin-top:8px;">
                        <button type="submit" class="btn btn-primary">✅ Créer</button>
                        <a th:href="@{/admin/categories}" class="btn btn-secondary">Annuler</a>
                    </div>
                </form>

                <!-- Modification -->
                <form th:if="${!isNew}"
                      th:action="@{/admin/categories/update/{id}(id=${category.id})}"
                      th:object="${category}"
                      method="post">
                    <div class="form-group">
                        <label for="nameEdit">Nom de la catégorie</label>
                        <input type="text" id="nameEdit" th:field="*{name}"
                               placeholder="ex: Électronique" required/>
                    </div>
                    <div style="display:flex; gap:12px; margin-top:8px;">
                        <button type="submit" class="btn btn-primary">💾 Enregistrer</button>
                        <a th:href="@{/admin/categories}" class="btn btn-secondary">Annuler</a>
                    </div>
                </form>

            </div>
        </div>

    </div>
</main>

</body>
</html>
