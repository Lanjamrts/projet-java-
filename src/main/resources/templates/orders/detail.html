<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Détail de commande — Marketplace</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .status-banner {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 20px;
            border-radius: 10px;
            margin-bottom: 24px;
            font-size: 1rem;
            font-weight: 600;
        }
        .status-banner .icon { font-size: 1.5rem; }
        .status-banner .text { display: flex; flex-direction: column; gap: 2px; }
        .status-banner .text small { font-weight: 400; font-size: .82rem; opacity: .85; }

        .status-banner.PENDING   { background: rgba(245,158,11,.12); border-left: 4px solid #f59e0b; color: #f59e0b; }
        .status-banner.CONFIRMED { background: rgba(59,130,246,.12); border-left: 4px solid #3b82f6; color: #3b82f6; }
        .status-banner.SHIPPED   { background: rgba(139,92,246,.12); border-left: 4px solid #8b5cf6; color: #8b5cf6; }
        .status-banner.DELIVERED { background: rgba(16,185,129,.12); border-left: 4px solid #10b981; color: #10b981; }

        /* Barre de progression */
        .progress-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            position: relative;
            padding: 0 8px;
        }
        .progress-bar::before {
            content: '';
            position: absolute;
            top: 18px;
            left: 8%;
            right: 8%;
            height: 2px;
            background: rgba(255,255,255,.1);
            z-index: 0;
        }
        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            z-index: 1;
        }
        .step-circle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            background: rgba(255,255,255,.05);
            border: 2px solid rgba(255,255,255,.15);
            color: rgba(255,255,255,.3);
        }
        .step-label {
            font-size: .72rem;
            color: rgba(255,255,255,.4);
            text-align: center;
        }
        .step.done .step-circle  { background: rgba(16,185,129,.2);  border-color: #10b981; color: #10b981; }
        .step.done .step-label   { color: #10b981; }
        .step.active .step-circle{ background: rgba(59,130,246,.25); border-color: #3b82f6; color: #3b82f6; }
        .step.active .step-label { color: #3b82f6; font-weight: 600; }
    </style>
</head>
<body>
<nav class="navbar">
    <a th:href="@{/dashboard}" class="navbar-brand">🛒 Marketplace</a>
    <div class="navbar-links">
        <a th:href="@{/products}">Produits</a>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin}">⚡ Admin</a>
    </div>
    <div class="navbar-right">
        <a th:href="@{/cart}" class="cart-btn">
            🛍️ Panier
            <span class="cart-badge" th:if="${cartCount != null and cartCount > 0}" th:text="${cartCount}">0</span>
        </a>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit" class="btn-link">Déconnexion</button>
        </form>
    </div>
</nav>

<div class="container">
    <div class="header-row">
        <h1 th:text="'Commande #' + ${order.id}">Commande #</h1>
        <a th:href="@{/orders}" class="btn btn-secondary">← Retour aux commandes</a>
    </div>

    <!-- ══ BANNIÈRE STATUT ══ -->
    <div class="status-banner"
         th:classappend="${order.status.name()}">
        <span class="icon"
              th:text="${order.status.name() == 'PENDING'}   ? '⏳' :
                       (${order.status.name() == 'CONFIRMED'} ? '✅' :
                       (${order.status.name() == 'SHIPPED'}   ? '🚚' : '🎉'))">
        </span>
        <div class="text">
            <span th:text="${order.status.name() == 'PENDING'}   ? 'Commande en attente de confirmation' :
                           (${order.status.name() == 'CONFIRMED'} ? 'Commande confirmée par le vendeur !' :
                           (${order.status.name() == 'SHIPPED'}   ? 'Votre commande est en route !'      :
                                                                     'Commande livrée — Merci !'        ))">
            </span>
            <small th:text="${order.status.name() == 'PENDING'}   ? 'Nous traitons votre commande.' :
                            (${order.status.name() == 'CONFIRMED'} ? 'Votre commande sera bientôt expédiée.' :
                            (${order.status.name() == 'SHIPPED'}   ? 'Vous recevrez votre colis très prochainement.' :
                                                                      'Votre commande a bien été reçue.'))">
            </small>
        </div>
    </div>

    <!-- ══ BARRE DE PROGRESSION ══ -->
    <div class="progress-bar">
        <div class="step"
             th:classappend="${order.status.name() == 'PENDING'} ? 'active' : 'done'">
            <div class="step-circle">📋</div>
            <span class="step-label">Commandé</span>
        </div>
        <div class="step"
             th:classappend="${order.status.name() == 'CONFIRMED'} ? 'active' :
                             (${order.status.name() == 'SHIPPED' or order.status.name() == 'DELIVERED'} ? 'done' : '')">
            <div class="step-circle">✅</div>
            <span class="step-label">Confirmé</span>
        </div>
        <div class="step"
             th:classappend="${order.status.name() == 'SHIPPED'} ? 'active' :
                             (${order.status.name() == 'DELIVERED'} ? 'done' : '')">
            <div class="step-circle">🚚</div>
            <span class="step-label">Expédié</span>
        </div>
        <div class="step"
             th:classappend="${order.status.name() == 'DELIVERED'} ? 'active' : ''">
            <div class="step-circle">🎉</div>
            <span class="step-label">Livré</span>
        </div>
    </div>

    <!-- ══ DÉTAILS ══ -->
    <div class="order-detail">
        <div class="order-detail-section">
            <h2>Informations</h2>
            <p><strong>Date :</strong>
               <span th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}">Date</span>
            </p>
            <p><strong>Adresse de livraison :</strong></p>
            <p th:text="${order.shippingAddress}">Adresse de livraison</p>
        </div>

        <div class="order-detail-section">
            <h2>Articles</h2>
            <div class="order-item" th:each="item : ${order.items}">
                <span th:text="${item.product.name}">Produit</span>
                <span th:text="${item.quantity} + ' × Ar' + ${#numbers.formatDecimal(item.price,1,'COMMA',2,'POINT')}">1 × $0.00</span>
                <span th:text="'Ar' + ${#numbers.formatDecimal(item.subtotal,1,'COMMA',2,'POINT')}">$0.00</span>
            </div>
            <div class="summary-divider"></div>
            <div class="summary-total">
                <span>Total payé</span>
                <span th:text="'Ar' + ${#numbers.formatDecimal(order.total,1,'COMMA',2,'POINT')}">$0.00</span>
            </div>
        </div>
    </div>
</div>
</body>
</html>
