<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mes commandes — Marketplace</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .badge-PENDING   { background: rgba(245,158,11,.15);  color: #f59e0b; border: 1px solid #f59e0b; }
        .badge-CONFIRMED { background: rgba(59,130,246,.15);  color: #3b82f6; border: 1px solid #3b82f6; }
        .badge-SHIPPED   { background: rgba(139,92,246,.15);  color: #8b5cf6; border: 1px solid #8b5cf6; }
        .badge-DELIVERED { background: rgba(16,185,129,.15);  color: #10b981; border: 1px solid #10b981; }

        .status-banner {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            border-radius: 10px;
            margin-bottom: 24px;
            font-size: .95rem;
            font-weight: 500;
        }
        .status-banner.PENDING   { background: rgba(245,158,11,.12); border-left: 4px solid #f59e0b; color: #f59e0b; }
        .status-banner.CONFIRMED { background: rgba(59,130,246,.12); border-left: 4px solid #3b82f6; color: #3b82f6; }
        .status-banner.SHIPPED   { background: rgba(139,92,246,.12); border-left: 4px solid #8b5cf6; color: #8b5cf6; }
        .status-banner.DELIVERED { background: rgba(16,185,129,.12); border-left: 4px solid #10b981; color: #10b981; }
    </style>
</head>
<body>
<nav class="navbar">
    <a th:href="@{/dashboard}" class="navbar-brand">🛒 Marketplace</a>
    <div class="navbar-links">
        <a th:href="@{/products}">Produits</a>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin}">⚡ Admin</a>
    </div>
    <div class="navbar-right">
        <a th:href="@{/cart}" class="cart-btn">
            🛍️ Panier
            <span class="cart-badge" th:if="${cartCount != null and cartCount > 0}" th:text="${cartCount}">0</span>
        </a>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit" class="btn-link">Déconnexion</button>
        </form>
    </div>
</nav>

<div class="container">
    <div class="header-row">
        <h1>Mes commandes</h1>
        <a th:href="@{/products}" class="btn btn-secondary">Continuer mes achats</a>
    </div>

    <div th:if="${#lists.isEmpty(orders)}" class="empty-state">
        <p style="font-size:3rem; margin-bottom:16px;">📦</p>
        <p>Vous n'avez aucune commande pour le moment.</p>
        <a th:href="@{/products}" class="btn" style="margin-top:16px;">Voir les produits</a>
    </div>

    <div th:if="${not #lists.isEmpty(orders)}" class="order-list">
        <div class="order-card" th:each="order : ${orders}">
            <div class="order-card-header">
                <div>
                    <h3 th:text="'Commande #' + ${order.id}">Commande #1</h3>
                    <small th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}">Date</small>
                </div>
                <!-- Badge coloré selon le statut -->
                <span class="badge"
                      th:classappend="'badge-' + ${order.status.name()}"
                      th:text="${order.status.name() == 'PENDING'}   ? '⏳ En attente'   :
                               (${order.status.name() == 'CONFIRMED'} ? '✅ Confirmée'    :
                               (${order.status.name() == 'SHIPPED'}   ? '🚚 Expédiée'    :
                                                                         '🎉 Livrée'))">
                </span>
            </div>
            <div class="order-card-body">
                <p th:text="'Total : Ar' + ${#numbers.formatDecimal(order.total,1,'COMMA',2,'POINT')}">Total</p>
                <a th:href="@{/orders/{id}(id=${order.id})}" class="btn btn-sm">Voir le détail</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
