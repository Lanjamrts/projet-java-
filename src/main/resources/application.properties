# ── Base de données ───────────────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:marketplacedb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true

# ── Thymeleaf ─────────────────────────────────────────────────────────────────
spring.thymeleaf.cache=false

# ── URL de base (utilisée pour les QR codes) ──────────────────────────────────
# Changer cette valeur lors du déploiement en production
app.base-url=http://localhost:8080

# ── Upload fichiers (pour les images produits, étape future) ──────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ── Logs (réduit le bruit en développement) ───────────────────────────────────
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN